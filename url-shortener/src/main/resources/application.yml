server:
  port: 8080

spring:
  application:
    name: url-shortener

  # H2 for local dev — swap to PostgreSQL in prod (see prod profile below)
  datasource:
    url: jdbc:h2:mem:urlshortener
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
    ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 86400000  # 24h default TTL (ms)

app:
  base-url: ${BASE_URL:http://localhost:8080}
  default-expiry-days: 30
  max-custom-alias-length: 20

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: URL Shortener API
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: false
